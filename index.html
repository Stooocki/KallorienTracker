<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kalorien">
<meta name="theme-color" content="#ffffff">
<title>KalorienTracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root {
  --green:#3B6D11;--green-l:#EAF3DE;--green-m:#97C459;--green-d:#27500A;
  --red:#A32D2D;--amber:#BA7517;--blue:#185FA5;
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeede8;
  --txt:#1a1a18;--txt2:#6b6b67;--txt3:#9e9d99;
  --brd:rgba(0,0,0,.1);--brd2:rgba(0,0,0,.18);
  --r:12px;--rs:8px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--txt:#f0efe8;--txt2:#9e9d99;--txt3:#6b6b67;--brd:rgba(255,255,255,.1);--brd2:rgba(255,255,255,.18);--green-l:#1a2e0a;}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg3);font-family:var(--font);color:var(--txt)}
body{display:flex;justify-content:center}
#app{width:100%;max-width:430px;background:var(--bg3);min-height:100vh;position:relative}
.header{background:var(--bg);padding:52px 16px 0;border-bottom:.5px solid var(--brd);position:sticky;top:0;z-index:10}
.hdate{font-size:12px;color:var(--txt2)}
.htitle{font-size:22px;font-weight:700;color:var(--txt);margin:2px 0 12px}
.tabs{display:flex}
.tab{flex:1;padding:8px 4px 10px;background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;font-size:11px;color:var(--txt3);display:flex;flex-direction:column;align-items:center;gap:3px;font-family:var(--font);transition:color .15s}
.tab.on{color:var(--green);border-bottom-color:var(--green)}
.tab i{font-size:20px}
.content{padding:12px 12px 90px}
.card{background:var(--bg);border:.5px solid var(--brd);border-radius:var(--r);padding:14px 16px;margin-bottom:10px}
.sec{font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.prow{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.bignum{font-size:36px;font-weight:700;line-height:1}
.biglbl{font-size:12px;color:var(--txt2);margin-top:4px}
.pbar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.pfill{height:100%;border-radius:4px;transition:width .4s}
.plbl{font-size:11px;color:var(--txt3);margin-top:5px}
.mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.mcell{background:var(--bg2);border-radius:var(--rs);padding:8px;text-align:center}
.mlbl{font-size:11px;color:var(--txt2)}
.mval{font-size:16px;font-weight:700;margin-top:2px}
.mrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:.5px solid var(--brd)}
.mrow:first-child{border-top:none}
.minfo{flex:1;min-width:0}
.mname{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.msub{font-size:11px;color:var(--txt3);margin-top:2px}
.mcal{font-size:15px;font-weight:700;white-space:nowrap}
.ibtn{background:none;border:none;cursor:pointer;color:var(--txt3);padding:4px;font-size:18px;display:flex;align-items:center}
.ibtn:hover{color:var(--red)}
.erow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:.5px solid var(--brd)}
.erow:first-child{border-top:none}
.fab{position:fixed;bottom:80px;right:max(12px,calc(50vw - 215px + 12px));background:var(--green);color:var(--green-l);border:none;border-radius:50px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 4px 16px rgba(59,109,17,.35);font-family:var(--font);z-index:20}
.bnav{background:var(--bg);border-top:.5px solid var(--brd);display:flex;padding:8px 0 24px;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:10}
.nbtn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;font-size:11px;font-family:var(--font);color:var(--txt3);transition:color .15s}
.nbtn.on{color:var(--green)}
.nbtn i{font-size:22px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-width:430px;padding:16px 16px 40px;max-height:88vh;overflow-y:auto}
.shdl{width:40px;height:4px;background:var(--brd2);border-radius:2px;margin:0 auto 16px}
.shtitle{font-size:17px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.mtabs{display:flex;gap:6px;margin-bottom:16px}
.mtab{flex:1;padding:8px 4px;border-radius:var(--rs);font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border:.5px solid var(--brd);background:var(--bg2);color:var(--txt2);font-family:var(--font)}
.mtab.on{border-color:var(--green);background:var(--green-l);color:var(--green)}
.mtab i{font-size:18px}
textarea,input[type=text],input[type=number],input[type=password]{width:100%;padding:12px;border:.5px solid var(--brd2);border-radius:var(--rs);font-size:15px;background:var(--bg2);color:var(--txt);font-family:var(--font);resize:none;outline:none;display:block}
textarea:focus,input:focus{border-color:var(--green)}
.btn{width:100%;padding:14px;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;border:none;font-family:var(--font)}
.btn:active{opacity:.85}
.btn-g{background:var(--green);color:var(--green-l)}
.btn-g:disabled{background:var(--bg3);color:var(--txt3);cursor:default}
.btn-o{background:var(--bg2);color:var(--txt2);border:.5px solid var(--brd2)}
.btn-r{background:#fcebeb;color:var(--red);border:.5px solid #f7c1c1}
.brow{display:flex;gap:8px}
.brow .btn:first-child{flex:1}
.brow .btn:last-child{flex:2}
.cbox{background:var(--green-l);border:.5px solid var(--green-m);border-radius:var(--r);padding:14px;margin-bottom:14px}
.cname{font-size:16px;font-weight:700;color:var(--green-d);margin-bottom:10px}
.cgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.ccell{background:rgba(255,255,255,.6);border-radius:var(--rs);padding:8px 10px}
.cclbl{font-size:11px;color:var(--green)}
.ccval{font-size:15px;font-weight:700;color:var(--green-d);margin-top:2px}
.fcard{background:var(--bg2);border:.5px solid var(--brd);border-radius:var(--r);padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.fcard:hover,.fcard:active{border-color:var(--green)}
.fname{font-size:15px;font-weight:700}
.fdesc{font-size:12px;color:var(--txt2);margin-top:3px}
.fmac{font-size:11px;color:var(--txt3);margin-top:3px}
.fcal{font-size:22px;font-weight:700;text-align:right}
.funit{font-size:11px;color:var(--txt2)}
.pzone{width:100%;padding:32px 16px;border:1.5px dashed var(--brd2);border-radius:var(--r);background:var(--bg2);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--txt2);font-family:var(--font)}
.pzone i{font-size:36px;color:var(--txt3)}
.chwrap{position:relative;width:100%;height:200px}
.drow{display:flex;align-items:center;gap:10px;padding:6px 0;border-top:.5px solid var(--brd)}
.drow:first-child{border-top:none}
.dname{font-size:12px;color:var(--txt2);min-width:24px}
.dbbg{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden}
.dbfill{height:100%;border-radius:4px}
.dcal{font-size:12px;min-width:38px;text-align:right}
.empty{text-align:center;padding:28px 16px;color:var(--txt3)}
.empty i{font-size:32px;display:block;margin-bottom:8px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:.5px solid var(--brd)}
.srow:first-child{border-top:none}
.slbl{font-size:14px;color:var(--txt2)}
.sval{font-size:14px;font-weight:600}
.legend{display:flex;justify-content:center;gap:14px;margin-top:10px;font-size:11px;color:var(--txt2);flex-wrap:wrap}
.ldot{width:9px;height:9px;border-radius:2px;display:inline-block;margin-right:4px;vertical-align:middle}
.setupcard{background:var(--bg);border:.5px solid var(--brd);border-radius:var(--r);padding:22px;margin:60px 12px 12px}
.stitle{font-size:22px;font-weight:700;margin-bottom:10px}
.stxt{font-size:14px;color:var(--txt2);line-height:1.7;margin-bottom:16px}
.slink{color:var(--green);font-weight:600;text-decoration:none}
.warn{font-size:13px;color:var(--amber);margin-bottom:8px;padding:8px;background:#faeeda;border-radius:var(--rs)}
.gap{margin-bottom:8px}
.gap2{margin-bottom:12px}
</style>
</head>
<body>
<div id="app"></div>
<script>
const TDEE_BASE=2285;
const DAYS=['So','Mo','Di','Mi','Do','Fr','Sa'];
const FAVS=[
  {id:'f1',name:'Frühstück',desc:'Magerquark · Heidelbeeren · Flohsamen · Protein',cal:279,protein:38,fat:5,carbs:22},
  {id:'f2',name:'Mittagessen',desc:'Haferflocken · Proteinpulver · Zimt · Samenmix',cal:352,protein:31,fat:9,carbs:36}
];

function todayKey(){return new Date().toISOString().split('T')[0]}
function dKey(ago){const d=new Date();d.setDate(d.getDate()-ago);return d.toISOString().split('T')[0]}
function nowT(){return new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}
function dateStr(){return new Date().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'})}
function ls(k,v){try{if(v===undefined)return JSON.parse(localStorage.getItem(k));localStorage.setItem(k,JSON.stringify(v))}catch(e){return null}}

let S={
  view:'heute',meals:[],exercises:[],showModal:false,modalTab:'text',
  textInput:'',loading:false,lmsg:'',pending:null,weekData:[],
  sportName:'',sportCal:'',apiKey:'',manName:'',manCal:'',manP:'',manF:'',manC:'',hasKey:false,showSetup:false,multiplier:1,editCal:'',editP:'',editF:'',editC:''
};

function init(){
  const k=localStorage.getItem('kk_apikey')||'';
  S.apiKey=k;S.hasKey=!!k;S.showSetup=!k;
  S.meals=ls('kk_meals_'+todayKey())||[];
  S.exercises=ls('kk_ex_'+todayKey())||[];
  buildWeek();render();
}

function set(p){Object.assign(S,p);render()}

function buildWeek(){
  S.weekData=[];
  for(let i=6;i>=0;i--){
    const key=dKey(i);
    const d=new Date();d.setDate(d.getDate()-i);
    const m=ls('kk_meals_'+key)||[];
    S.weekData.push({day:DAYS[d.getDay()],cal:m.reduce((s,x)=>s+x.cal,0),isToday:i===0});
  }
}

function saveMeals(m){S.meals=m;ls('kk_meals_'+todayKey(),m);buildWeek()}
function saveEx(e){S.exercises=e;ls('kk_ex_'+todayKey(),e)}
function delMeal(id){saveMeals(S.meals.filter(m=>m.id!==id));render()}
function delEx(id){saveEx(S.exercises.filter(e=>e.id!==id));render()}

function addFav(f){saveMeals([...S.meals,{...f,id:Date.now(),time:nowT()}]);set({showModal:false})}

function confirmAdd(){
  const m=S.multiplier||1;
  const entry={
    ...S.pending,
    id:Date.now(),
    cal:Math.round((parseFloat(S.editCal)||S.pending.cal)*m),
    protein:Math.round((parseFloat(S.editP)||S.pending.protein)*m),
    fat:Math.round((parseFloat(S.editF)||S.pending.fat)*m),
    carbs:Math.round((parseFloat(S.editC)||S.pending.carbs)*m),
    name:S.multiplier!==1?S.pending.name+' ×'+S.multiplier:S.pending.name
  };
  saveMeals([...S.meals,entry]);
  set({pending:null,textInput:'',showModal:false,multiplier:1});
}

function addManual(){
  const n=S.manName.trim(),c=parseInt(S.manCal);
  if(!n||!c)return;
  const entry={id:Date.now(),name:n,cal:c,protein:parseInt(S.manP)||0,fat:parseInt(S.manF)||0,carbs:parseInt(S.manC)||0,time:nowT()};
  saveMeals([...S.meals,entry]);
  set({manName:'',manCal:'',manP:'',manF:'',manC:'',showModal:false});
}
function addExercise(){
  const n=S.sportName.trim(),c=parseInt(S.sportCal);
  if(!n||!c)return;
  saveEx([...S.exercises,{id:Date.now(),name:n,cal:c,time:nowT()}]);
  set({sportName:'',sportCal:'',showModal:false});
}

async function analyzeText(){
  const txt=S.textInput.trim();
  if(!txt||!S.apiKey)return;
  set({loading:true,lmsg:'Analysiere...'});
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,
        system:'Antworte NUR mit JSON ohne Markdown. Format: {"name":"Name","cal":Zahl,"protein":Zahl,"fat":Zahl,"carbs":Zahl}',
        messages:[{role:'user',content:'Kalorien schätzen: '+txt}]})
    });
    const d=await r.json();
    const raw=(d.content||[]).find(b=>b.type==='text')?.text||'';
    const p=JSON.parse(raw.replace(/```json|```/g,'').trim());
    const _p={...p,time:nowT()};set({loading:false,pending:_p,multiplier:1,editCal:String(_p.cal),editP:String(_p.protein),editF:String(_p.fat),editC:String(_p.carbs)});
  }catch(e){set({loading:false});alert('Fehler. API-Key korrekt?')}
}

async function analyzePhoto(file){
  if(!S.apiKey)return;
  set({loading:true,lmsg:'Analysiere Foto...'});
  const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(',')[1]);r.onerror=rej;r.readAsDataURL(file)});
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,
        system:'Antworte NUR mit JSON ohne Markdown. Format: {"name":"Name","cal":Zahl,"protein":Zahl,"fat":Zahl,"carbs":Zahl}. Schätze Portionsgröße realistisch.',
        messages:[{role:'user',content:[{type:'image',source:{type:'base64',media_type:file.type,data:b64}},{type:'text',text:'Was ist das und wie viele Kalorien?'}]}]})
    });
    const d=await r.json();
    const raw=(d.content||[]).find(b=>b.type==='text')?.text||'';
    const p=JSON.parse(raw.replace(/```json|```/g,'').trim());
    const _p2={...p,time:nowT()};set({loading:false,pending:_p2,multiplier:1,editCal:String(_p2.cal),editP:String(_p2.protein),editF:String(_p2.fat),editC:String(_p2.carbs)});
  }catch(e){set({loading:false});alert('Fehler bei Foto-Analyse.')}
}

function saveApiKey(){
  const k=document.getElementById('apikeyinput')?.value?.trim();
  if(!k)return;
  localStorage.setItem('kk_apikey',k);
  set({apiKey:k,hasKey:true,showSetup:false});
}

function resetToday(){
  if(!confirm('Alle Einträge von heute löschen?'))return;
  localStorage.removeItem('kk_meals_'+todayKey());
  localStorage.removeItem('kk_ex_'+todayKey());
  S.meals=[];S.exercises=[];buildWeek();render();
}

let _chart=null;
function renderChart(){
  const c=document.getElementById('wkchart');
  if(!c)return;
  if(_chart){_chart.destroy();_chart=null}
  _chart=new Chart(c,{
    type:'bar',
    data:{labels:S.weekData.map(d=>d.day),datasets:[{data:S.weekData.map(d=>d.cal),backgroundColor:S.weekData.map(d=>d.isToday?'#3B6D11':d.cal>TDEE_BASE?'#A32D2D':d.cal>0?'#C0DD97':'#D3D1C7'),borderRadius:4,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.raw+' kcal'}}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#9e9d99'},border:{display:false}},y:{display:false,max:TDEE_BASE+1200,min:0}},layout:{padding:{top:24}}},
    plugins:[{id:'gl',afterDraw(ch){const{ctx,chartArea:{left,right},scales:{y}}=ch;const yp=y.getPixelForValue(TDEE_BASE);ctx.save();ctx.strokeStyle='#3B6D11';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);ctx.beginPath();ctx.moveTo(left,yp);ctx.lineTo(right-30,yp);ctx.stroke();ctx.fillStyle='#3B6D11';ctx.font='700 11px sans-serif';ctx.fillText('Ziel',right-26,yp-3);ctx.restore()}}]
  });
}

function h(tag,attrs,...kids){
  const el=document.createElement(tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(k==='onclick')el.addEventListener('click',v);
    else if(k==='oninput')el.addEventListener('input',v);
    else if(k==='onchange')el.addEventListener('change',v);
    else if(k.startsWith('_'))el[k.slice(1)]=v;
    else el.setAttribute(k,v);
  }
  for(const c of kids){
    if(c==null)continue;
    el.appendChild(typeof c==='string'?document.createTextNode(c):c);
  }
  return el;
}
function ic(n){const i=document.createElement('i');i.className='ti ti-'+n;i.setAttribute('aria-hidden','true');return i}
function dv(cls,...kids){return h('div',{class:cls},...kids)}
function tx(cls,txt){const el=document.createElement('div');el.className=cls;el.textContent=txt;return el}
function sp(cls,txt){const el=document.createElement('span');el.className=cls;el.textContent=txt;return el}

function render(){
  const root=document.getElementById('app');
  root.innerHTML='';

  if(S.showSetup){
    const c=dv('setupcard');
    c.appendChild(tx('stitle','API-Key einrichten'));
    const t=document.createElement('div');t.className='stxt';
    t.innerHTML='Für die KI-Analyse (Text &amp; Foto) benötigst du einen Anthropic API-Key.<br><br>1. Gehe zu <a href="https://console.anthropic.com" class="slink" target="_blank">console.anthropic.com</a><br>2. Erstelle einen Account &amp; gehe zu "API Keys"<br>3. Erstelle einen neuen Key und füge ihn hier ein<br><br><small style="color:var(--txt3)">Der Key wird nur lokal auf diesem Gerät gespeichert.</small>';
    c.appendChild(t);
    const inp=h('input',{type:'password',id:'apikeyinput',placeholder:'sk-ant-...'});inp.style.marginBottom='10px';
    c.appendChild(inp);
    c.appendChild(h('button',{class:'btn btn-g gap2',onclick:saveApiKey},'Speichern & starten'));
    c.appendChild(h('button',{class:'btn btn-o',style:'margin-top:8px',onclick:()=>set({showSetup:false})},'Überspringen (nur manuell einloggen)'));
    root.appendChild(c);
    return;
  }

  const totCal=S.meals.reduce((s,m)=>s+m.cal,0);
  const burnCal=S.exercises.reduce((s,e)=>s+e.cal,0);
  const budget=TDEE_BASE+burnCal;
  const netCal=totCal;
  const rem=budget-totCal;
  const pct=Math.min(totCal/budget,1);
  const barC=rem<0?'#A32D2D':rem<300?'#BA7517':'#3B6D11';
  const remC=rem<0?'#A32D2D':rem<300?'#BA7517':'#3B6D11';
  const totP=S.meals.reduce((s,m)=>s+(m.protein||0),0);
  const totF=S.meals.reduce((s,m)=>s+(m.fat||0),0);
  const totCrb=S.meals.reduce((s,m)=>s+(m.carbs||0),0);
  const avgCal=S.weekData.filter(d=>d.cal>0).length?Math.round(S.weekData.filter(d=>d.cal>0).reduce((s,d)=>s+d.cal,0)/S.weekData.filter(d=>d.cal>0).length):0;
  const titles={heute:'Heute',favoriten:'Favoriten',woche:'Diese Woche',einstellungen:'Profil'};

  // Header
  const hdr=dv('header');
  hdr.appendChild(tx('hdate',dateStr()));
  hdr.appendChild(tx('htitle',titles[S.view]));
  root.appendChild(hdr);

  // Content
  const cnt=dv('content');

  if(S.view==='heute'){
    // Progress card
    const pc=dv('card');
    const pr=dv('prow');
    const pl=dv('');
    const bn=document.createElement('div');bn.className='bignum';bn.textContent=netCal;
    const bl=tx('biglbl','von '+budget+' kcal');
    pl.append(bn,bl);
    const rig=dv('');rig.style.textAlign='right';
    const rl=tx('','Noch übrig');rl.style.cssText='font-size:12px;color:var(--txt2)';
    const rv=document.createElement('div');rv.style.cssText='font-size:26px;font-weight:700;color:'+remC;rv.textContent=rem;
    const ru=tx('','kcal');ru.style.cssText='font-size:12px;color:var(--txt2)';
    rig.append(rl,rv,ru);pr.append(pl,rig);
    const pb=dv('pbar');const pf=dv('pfill');pf.style.width=Math.round(pct*100)+'%';pf.style.background=barC;pb.appendChild(pf);
    const plbl=tx('plbl',Math.round(pct*100)+'% des Tagesbudgets');
    const mg=dv('mgrid');
    [['Protein',totP+'g','#185FA5'],['Fett',totF+'g','#BA7517'],['Carbs',totCrb+'g','#3B6D11']].forEach(([l,v,c])=>{
      const mc=dv('mcell');mc.appendChild(tx('mlbl',l));const mv=tx('mval',v);mv.style.color=c;mc.appendChild(mv);mg.appendChild(mc);
    });
    pc.append(pr,pb,plbl,mg);cnt.appendChild(pc);

    // Exercises
    if(S.exercises.length){
      const ec=dv('card');ec.appendChild(tx('sec','Sport'));
      S.exercises.forEach(ex=>{
        const r=dv('erow');
        const nm=document.createElement('span');nm.style.cssText='font-size:14px;color:var(--txt)';nm.textContent=ex.name+(ex.time?' · '+ex.time:'');
        const right=dv('');right.style.cssText='display:flex;align-items:center;gap:6px';
        const cv=document.createElement('span');cv.style.cssText='font-size:15px;font-weight:700;color:#3B6D11';cv.textContent='-'+ex.cal+' kcal';
        const db=h('button',{class:'ibtn',onclick:()=>delEx(ex.id)},ic('trash'));
        right.append(cv,db);r.append(nm,right);ec.appendChild(r);
      });
      cnt.appendChild(ec);
    }

    // Meals
    const mc=dv('card');mc.appendChild(tx('sec','Mahlzeiten'));
    if(!S.meals.length){
      const em=dv('empty');const ei=ic('bowl-chopsticks');ei.style.fontSize='30px';em.append(ei,tx('','Noch nichts eingetragen'));mc.appendChild(em);
    } else {
      S.meals.forEach(m=>{
        const r=dv('mrow');
        const mi=dv('minfo');mi.appendChild(tx('mname',m.name));mi.appendChild(tx('msub',(m.time||'')+' · P:'+(m.protein||0)+'g F:'+(m.fat||0)+'g C:'+(m.carbs||0)+'g'));
        const rg=dv('');rg.style.cssText='display:flex;align-items:center;gap:4px';
        const cv=tx('mcal',''+m.cal);
        const db=h('button',{class:'ibtn',onclick:()=>delMeal(m.id)},ic('trash'));
        rg.append(cv,db);r.append(mi,rg);mc.appendChild(r);
      });
    }
    cnt.appendChild(mc);
  }

  if(S.view==='favoriten'){
    const hint=document.createElement('p');hint.style.cssText='font-size:13px;color:var(--txt2);margin-bottom:12px';hint.textContent='Tippe auf einen Favoriten um ihn sofort zum heutigen Tag hinzuzufügen.';
    cnt.appendChild(hint);
    FAVS.forEach(f=>{
      const fc=dv('fcard');fc.addEventListener('click',()=>{addFav(f);set({view:'heute'})});
      const left=dv('');left.append(tx('fname',f.name),tx('fdesc',f.desc),tx('fmac','P:'+f.protein+'g · F:'+f.fat+'g · C:'+f.carbs+'g'));
      const right=dv('');right.append(tx('fcal',''+f.cal),tx('funit','kcal'));
      fc.append(left,right);cnt.appendChild(fc);
    });
    const inf=dv('card');inf.appendChild(tx('','Weitere Favoriten lassen sich in einer späteren Version im Profil konfigurieren.'));inf.style.fontSize='13px';inf.style.color='var(--txt2)';
    cnt.appendChild(inf);
  }

  if(S.view==='woche'){
    const mg=dv('');mg.style.cssText='display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px';
    [['Ø kcal / Tag',avgCal||'–'],['Basis-Ziel',TDEE_BASE]].forEach(([l,v])=>{
      const c=dv('card');c.style.textAlign='center';
      const cl=tx('',''+l);cl.style.cssText='font-size:11px;color:var(--txt2)';
      const cv=tx('',''+v);cv.style.cssText='font-size:24px;font-weight:700;margin-top:4px';
      c.append(cl,cv);mg.appendChild(c);
    });
    cnt.appendChild(mg);
    const cc=dv('card');
    const cw=dv('chwrap');const cv=document.createElement('canvas');cv.id='wkchart';cv.setAttribute('role','img');cv.setAttribute('aria-label','Wöchentliche Kalorienübersicht');
    cw.appendChild(cv);cc.appendChild(cw);
    const leg=dv('legend');
    [['#C0DD97','Unter Ziel'],['#3B6D11','Heute'],['#A32D2D','Über Ziel']].forEach(([c,l])=>{
      const s=document.createElement('span');const dot=document.createElement('span');dot.className='ldot';dot.style.background=c;s.append(dot,document.createTextNode(l));leg.appendChild(s);
    });
    cc.appendChild(leg);cnt.appendChild(cc);
    const lc=dv('card');
    S.weekData.forEach(d=>{
      const r=dv('drow');
      const nm=document.createElement('span');nm.className='dname';if(d.isToday){nm.style.fontWeight='700';nm.style.color='var(--txt)'}nm.textContent=d.day;
      const bg=dv('dbbg');const fill=dv('dbfill');fill.style.width=(d.cal?Math.min(d.cal/TDEE_BASE*100,100):0)+'%';fill.style.background=d.isToday?'#3B6D11':d.cal>TDEE_BASE?'#A32D2D':d.cal>0?'#97C459':'transparent';bg.appendChild(fill);
      const dcal=document.createElement('span');dcal.className='dcal';if(d.isToday)dcal.style.fontWeight='700';dcal.textContent=d.cal>0?d.cal:'–';
      r.append(nm,bg,dcal);lc.appendChild(r);
    });
    cnt.appendChild(lc);
    setTimeout(renderChart,50);
  }

  if(S.view==='einstellungen'){
    const pc=dv('card');pc.appendChild(tx('sec','Mein Profil'));
    [['Geschlecht','Männlich'],['Alter','39 Jahre'],['Größe','191 cm'],['Gewicht','90 kg'],['Aktivität','Mäßig aktiv (3–5×/Wo)'],['Ziel','Gewicht halten'],['Basis (ohne Sport)',TDEE_BASE+' kcal'],['Sport-Tage',TDEE_BASE+'+Sport kcal']].forEach(([l,v])=>{
      const r=dv('srow');r.append(tx('slbl',l),tx('sval',v));pc.appendChild(r);
    });
    cnt.appendChild(pc);
    const ak=dv('card');
    ak.appendChild(tx('sec','API-Key'));
    const ast=document.createElement('div');ast.style.cssText='font-size:13px;margin-bottom:10px;color:'+(S.hasKey?'#3B6D11':'var(--amber)');ast.textContent=S.hasKey?'✓ API-Key hinterlegt – KI-Analyse aktiv':'⚠ Kein API-Key – KI-Analyse nicht verfügbar';
    ak.appendChild(ast);
    ak.appendChild(h('button',{class:'btn btn-o',onclick:()=>set({showSetup:true})},S.hasKey?'API-Key ändern':'API-Key einrichten'));
    cnt.appendChild(ak);
    const rc=dv('card');
    rc.appendChild(tx('sec','Daten'));
    const rd=tx('','Alle Mahlzeiten und Sport des heutigen Tages löschen.');rd.style.cssText='font-size:13px;color:var(--txt2);margin-bottom:10px';
    rc.append(rd,h('button',{class:'btn btn-r',onclick:resetToday},'Heute zurücksetzen'));
    cnt.appendChild(rc);
  }

  root.appendChild(cnt);

  // FAB
  if(S.view==='heute'){
    root.appendChild(h('button',{class:'fab',onclick:()=>set({showModal:true,modalTab:'text',pending:null})},ic('plus'),' Hinzufügen'));
  }

  // Bottom Nav
  const nav=dv('bnav');
  [{id:'heute',ic:'home',l:'Heute'},{id:'favoriten',ic:'star',l:'Favoriten'},{id:'woche',ic:'chart-bar',l:'Woche'},{id:'einstellungen',ic:'settings',l:'Profil'}].forEach(t=>{
    nav.appendChild(h('button',{class:'nbtn'+(S.view===t.id?' on':''),onclick:()=>set({view:t.id})},ic(t.ic),t.l));
  });
  root.appendChild(nav);

  // Modal
  if(S.showModal){
    const ov=dv('overlay');ov.addEventListener('click',e=>{if(e.target===ov)set({showModal:false,pending:null})});
    const sh=dv('sheet');sh.appendChild(dv('shdl'));
    const sht=dv('shtitle');sht.append(document.createTextNode('Hinzufügen'),h('button',{class:'ibtn',onclick:()=>set({showModal:false,pending:null})},ic('x')));
    sh.appendChild(sht);

    if(!S.pending){
      const mts=dv('mtabs');
      [{id:'text',ic:'keyboard',l:'Text'},{id:'foto',ic:'camera',l:'Foto'},{id:'manuell',ic:'pencil',l:'Manuell'},{id:'favorit',ic:'star',l:'Favorit'},{id:'sport',ic:'run',l:'Sport'}].forEach(t=>{
        mts.appendChild(h('button',{class:'mtab'+(S.modalTab===t.id?' on':''),onclick:()=>set({modalTab:t.id,pending:null})},ic(t.ic),t.l));
      });
      sh.appendChild(mts);

      if(S.modalTab==='text'){
        if(!S.hasKey){const w=dv('warn');w.textContent='⚠ Kein API-Key – bitte zuerst im Profil einrichten.';sh.appendChild(w)}
        const ta=document.createElement('textarea');ta.rows=4;ta.placeholder='z.B. 2 Rühreier, 1 Scheibe Vollkornbrot, Kaffee mit Milch';ta.value=S.textInput;ta.className='gap2';ta.addEventListener('input',e=>S.textInput=e.target.value);
        const ab=h('button',{class:'btn btn-g',onclick:analyzeText});ab.textContent=S.loading?S.lmsg:'Analysieren →';ab.disabled=S.loading||!S.textInput.trim()||!S.hasKey;
        sh.append(ta,ab);
      } else if(S.modalTab==='foto'){
        if(!S.hasKey){const w=dv('warn');w.textContent='⚠ Kein API-Key – bitte zuerst im Profil einrichten.';sh.appendChild(w)}
        const fi=h('input',{type:'file',accept:'image/*',capture:'environment',id:'photofi',onchange:e=>{if(e.target.files[0])analyzePhoto(e.target.files[0])}});fi.style.display='none';
        const pz=h('button',{class:'pzone',onclick:()=>document.getElementById('photofi').click()},ic('camera'),S.loading?S.lmsg:'Foto aufnehmen oder auswählen');
        sh.append(fi,pz);
      } else if(S.modalTab==='favorit'){
        FAVS.forEach(f=>{
          const fc=dv('fcard');fc.addEventListener('click',()=>{addFav(f);set({showModal:false})});
          const left=dv('');left.append(tx('fname',f.name),tx('fdesc',f.desc));
          const right=dv('');right.append(tx('fcal',''+f.cal),tx('funit','kcal'));
          fc.append(left,right);sh.appendChild(fc);
        });
      } else if(S.modalTab==='manuell'){
        const mn=h('input',{type:'text',placeholder:'Name (z.B. Banane, Protein-Riegel)',oninput:e=>S.manName=e.target.value});mn.value=S.manName;mn.className='gap';
        const mc=h('input',{type:'number',placeholder:'Kalorien (kcal) *',oninput:e=>S.manCal=e.target.value});mc.value=S.manCal;mc.className='gap';
        const mrow=dv('');mrow.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px';
        const mp=h('input',{type:'number',placeholder:'Protein g',oninput:e=>S.manP=e.target.value});mp.value=S.manP;
        const mf=h('input',{type:'number',placeholder:'Fett g',oninput:e=>S.manF=e.target.value});mf.value=S.manF;
        const mcarb=h('input',{type:'number',placeholder:'Carbs g',oninput:e=>S.manC=e.target.value});mcarb.value=S.manC;
        mrow.append(mp,mf,mcarb);
        const hint=document.createElement('div');hint.style.cssText='font-size:11px;color:var(--txt3);margin-bottom:10px';hint.textContent='Makros optional – nur Kalorien ist Pflicht';
        sh.append(mn,mc,mrow,hint,h('button',{class:'btn btn-g',onclick:addManual},ic('plus'),' Hinzufügen'));
      } else if(S.modalTab==='sport'){
        const ni=h('input',{type:'text',placeholder:'Aktivität (z.B. Gym, Laufen)',oninput:e=>S.sportName=e.target.value});ni.value=S.sportName;ni.className='gap';
        const ci=h('input',{type:'number',placeholder:'Verbrannte kcal (laut Fitness-App)',oninput:e=>S.sportCal=e.target.value});ci.value=S.sportCal;ci.className='gap2';
        sh.append(ni,ci,h('button',{class:'btn btn-g',onclick:addExercise},ic('plus'),' Eintragen'));
      }
    } else {
      const m=S.multiplier||1;
      const cb=dv('cbox');
      cb.appendChild(tx('cname',S.pending.name));

      // Editable fields
      const cg=dv('cgrid');
      const fields=[
        ['Kalorien','editCal','kcal'],
        ['Protein','editP','g'],
        ['Fett','editF','g'],
        ['Carbs','editC','g']
      ];
      fields.forEach(([lbl,key,unit])=>{
        const cc=dv('ccell');
        cc.appendChild(tx('cclbl',lbl));
        const wrap=dv('');wrap.style.cssText='display:flex;align-items:center;gap:4px;margin-top:2px';
        const inp=h('input',{type:'number',oninput:e=>{S[key]=e.target.value;render()}});
        inp.value=Math.round((parseFloat(S[key])||0)*m);
        inp.style.cssText='padding:4px 6px;font-size:14px;font-weight:700;color:var(--green-d);background:rgba(255,255,255,.7);border:.5px solid var(--green-m);border-radius:6px;width:70px;margin:0';
        inp.readOnly=true;
        const su=document.createElement('span');su.style.cssText='font-size:12px;color:var(--green)';su.textContent=unit;
        wrap.append(inp,su);cc.appendChild(wrap);
        cg.appendChild(cc);
      });
      cb.appendChild(cg);

      // Multiplier selector
      const mlbl=tx('cclbl','Portion');mlbl.style.cssText='font-size:11px;color:var(--green);margin-top:12px;margin-bottom:6px;display:block';
      cb.appendChild(mlbl);
      const mrow=dv('');mrow.style.cssText='display:flex;gap:6px';
      [0.5,1,1.5,2,3].forEach(v=>{
        const btn=h('button',{
          onclick:()=>{
            S.multiplier=v;render();
          }
        },'×'+v);
        btn.style.cssText='flex:1;padding:8px 4px;border-radius:var(--rs);font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);border:.5px solid '+(m===v?'var(--green)':'var(--brd2)')+';background:'+(m===v?'var(--green)':'var(--bg2)')+';color:'+(m===v?'var(--green-l)':'var(--txt2)');
        mrow.appendChild(btn);
      });
      cb.appendChild(mrow);

      const br=dv('brow');br.style.marginTop='14px';
      br.append(
        h('button',{class:'btn btn-o',onclick:()=>set({pending:null})},'Zurück'),
        h('button',{class:'btn btn-g',onclick:()=>confirmAdd()},'Hinzufügen ✓')
      );
      sh.append(cb,br);
    }
    ov.appendChild(sh);root.appendChild(ov);
  }
}

init();
</script>
</body>
</html>
